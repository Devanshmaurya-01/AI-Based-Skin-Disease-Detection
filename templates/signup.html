<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Signup - DermaVision</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    font-family:Poppins;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background: radial-gradient(circle at top left, #234C6A, #1B3C53);
    padding:40px 15px; /* FIX CUT ISSUE */
}

/*  Glass Card */
.auth-box{
    width:380px;
    max-width:95%;
    padding:30px 25px;
    border-radius:20px;
    backdrop-filter:blur(20px);
    background:rgba(255,255,255,0.06);

    /*  GLOW BACK */
    box-shadow:
        0 0 60px rgba(59,130,246,0.25),  /* blue glow */
        0 8px 30px rgba(0,0,0,0.6);

    text-align:center;
    color:white;
}



/* Title */
h1{
    margin-bottom:5px;
}

p{
    color:#94a3b8;
    margin-bottom:20px;
}

/* Input wrapper */
.input-box{
    position:relative;
    margin:12px 0;
}

/* Inputs SAME SIZE */
input, select{
    width:100%;
    height:48px;
    padding:0 12px;
    border:none;
    border-radius:10px;
    outline:none;
    background:rgba(255,255,255,0.08);
    color:white;
    font-size:14px;
    box-sizing:border-box;
}

/* Placeholder */
input::placeholder{
    color:#94a3b8;
}

/* Clean focus */
input:focus, select:focus{
    outline:2px solid rgba(255,255,255,0.2);
}

/* Eye icon */
.eye{
    position:absolute;
    right:12px;
    top:50%;
    transform:translateY(-50%);
    cursor:pointer;
    color:#94a3b8;
}

/* Button */
button{
    width:100%;
    height:48px;
    margin-top:10px;
    border:none;
    border-radius:10px;
    background:linear-gradient(135deg,#7c3aed,#22c55e);
    color:white;
    font-weight:bold;
    font-size:15px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    transform:scale(1.03);
}

/* Links */
a{
    color:#38bdf8;
    text-decoration:none;
}

a:hover{
    text-decoration:underline;
}

/* Error */
.error{
    color:#f87171;
    margin-top:10px;
}

select {
    background-color: rgba(255,255,255,0.08);
    color: white;
}

/* Dropdown options fix */
select option {
    background: #1e293b;  /* dark background */
    color: white;
}

</style>

<script>
function validateForm(){
    let pass = document.getElementById("password").value;
    let confirm = document.getElementById("confirm_password").value;

    if(pass !== confirm){
        alert("Passwords do not match!");
        return false;
    }
    return true;
}

/* 👁 Toggle Password */
function togglePassword(id, icon){
    let input = document.getElementById(id);

    if(input.type === "password"){
        input.type = "text";
        icon.innerHTML = "";
    }else{
        input.type = "password";
        icon.innerHTML = "👁";
    }
}
</script>

</head>

<body>

<div class="auth-box">

<h1>✨ Create Account</h1>
<p>Join DermaVision AI</p>

<form method="POST" action="/signup" onsubmit="return validateForm()">

<div class="input-box">
<input type="text" name="name" placeholder="Full Name" required>
</div>

<div class="input-box">
<input type="email" name="email" placeholder="Email Address" required>
</div>

<div class="input-box">
<input type="date" name="dob" required>
</div>

<div class="input-box">
<select name="gender" required>
<option value="">Select Gender</option>
<option value="Male">Male</option>
<option value="Female">Female</option>
<option value="Other">Other</option>
</select>
</div>

<div class="input-box">
<input type="password" id="password" name="password" placeholder="Password" required>
<span class="eye" onclick="togglePassword('password', this)">👁</span>
</div>

<div class="input-box">
<input type="password" id="confirm_password" placeholder="Confirm Password" required>
<span class="eye" onclick="togglePassword('confirm_password', this)">👁</span>
</div>

<button type="submit">REGISTER</button>

</form>

{% if error %}
<p class="error">{{ error }}</p>
{% endif %}

<p style="margin-top:15px;">Already have an account?</p>
<a href="/login">Sign In</a>

</div>

</body>
</html>
