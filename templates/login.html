<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login - DermaVision</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    font-family:Poppins;
    height:100vh; /*  min-height hata ke height use kar */
    display:flex;
    justify-content:center;
    align-items:center;
    background: radial-gradient(circle at top left, #234C6A, #1B3C53);
    overflow:hidden; /*  scrollbar hata dega */
}

/* 💎 Glass Card */
.auth-box{
    width:380px;
    max-width:95%;
    padding:25px 20px; /*  thoda kam kar diya */
    border-radius:20px;
    backdrop-filter:blur(20px);
    background:rgba(255,255,255,0.06);
    box-shadow:
        0 0 60px rgba(59,130,246,0.25),
        0 8px 30px rgba(0,0,0,0.6);
    text-align:center;
    color:white;
}

/* Title */
h1{
    margin-bottom:5px;
}

p{
    color:#94a3b8;
    margin-bottom:20px;
}

/* Input wrapper */
.input-box{
    margin:12px 0;
}

/* Inputs SAME SIZE */
input{
    width:100%;
    height:48px;
    padding:0 12px;
    border:none;
    border-radius:10px;
    outline:none;
    background:rgba(255,255,255,0.08);
    color:white;
    font-size:14px;
    box-sizing:border-box;
}

/* Placeholder */
input::placeholder{
    color:#94a3b8;
}

/* Focus */
input:focus{
    outline:2px solid rgba(255,255,255,0.2);
}

/* Button */
button{
    width:100%;
    height:48px;
    margin-top:10px;
    border:none;
    border-radius:10px;
    background:linear-gradient(135deg,#7c3aed,#22c55e);
    color:white;
    font-weight:bold;
    font-size:15px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    transform:scale(1.03);
}

/* Links */
a{
    color:#38bdf8;
    text-decoration:none;
}

a:hover{
    text-decoration:underline;
}

/* Error */
.error{
    color:#f87171;
    margin-top:10px;
}

input{
    margin:08px 0;
}

button{
    margin-top:15px;
}

</style>

</head>

<body>

<div class="auth-box">

<h1>🧬 DermaVision</h1>
<p>Login to continue</p>

<form method="POST" action="/login">

<input type="email" name="email" placeholder="Email Address" required>
<input type="password" name="password" placeholder="Password" required>

<button type="submit">LOGIN</button>

</form>

{% if error %}
<p class="error">{{ error }}</p>
{% endif %}

<p style="margin-top:15px;">Don't have an account?</p>
<a href="/signup">Create Account</a>

</div>

</body>
</html>
